<body>
  <section id="avis">
    <h3>Ce que nos visiteurs disent</h3>
    <div class="avis-container">
      <!-- Les avis validés seront insérés ici dynamiquement -->
    </div>
  </section>



  <section id="avis">
    <h3>Ce que nos visiteurs disent</h3>
    <div class="avis-container-wrapper">
      <button id="prev" class="nav-btn">&lt;</button>
      <div class="avis-container">
        <!-- Les avis validés seront insérés ici dynamiquement -->
      </div>
      <button id="next" class="nav-btn">&gt;</button>
    </div>
  </section>


  <section id="avis">
    <h3>Ce que nos visiteurs disent</h3>
    <div class="avis-container-wrapper">
      <button id="prev" class="nav-btn">&lt;</button>
      <div class="avis-container">
        <!-- Les avis validés seront insérés ici dynamiquement -->
      </div>
      <button id="next" class="nav-btn">&gt;</button>
    </div>
  </section>



  <script>
    document.addEventListener("DOMContentLoaded", function () {
      fetch("./avis-api.php")
        .then(response => response.json())
        .then(data => {
          const avisContainer = document.querySelector(".avis-container");

          if (data.length === 0) {
            avisContainer.innerHTML = "<p>Aucun avis disponible pour le moment.</p>";
            return;
          }

          data.forEach(avis => {
            const avisElement = document.createElement("div");
            avisElement.className = "avis";
            avisElement.innerHTML = `
              <p>“${avis.message}”</p>
              <cite>- ${avis.auteur}</cite>
            `;
            avisContainer.appendChild(avisElement);
          });
        })
        .catch(error => {
          console.error("Erreur :", error);
          document.querySelector(".avis-container").innerHTML =
            "<p>Erreur lors du chargement des avis.</p>";
        });
    });
  </script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const avisContainer = document.querySelector(".avis-container");
    const prevButton = document.querySelector("#prev");
    const nextButton = document.querySelector("#next");

    // Charger les avis depuis l'API
    fetch("avis-api.php")
      .then(response => response.json())
      .then(data => {
        if (data.length === 0) {
          avisContainer.innerHTML = "<p>Aucun avis disponible pour le moment.</p>";
          return;
        }

        data.forEach(avis => {
          const avisElement = document.createElement("div");
          avisElement.className = "avis";
          avisElement.innerHTML = `
            <p>“${avis.message}”</p>
            <cite>- ${avis.auteur}</cite>
          `;
          avisContainer.appendChild(avisElement);
        });

        startAutoScroll(); // Lancer le défilement automatique une fois les avis chargés
      })
      .catch(error => {
        console.error("Erreur :", error);
        avisContainer.innerHTML = "<p>Erreur lors du chargement des avis.</p>";
      });

    // Défilement automatique
    let autoScroll;
    const startAutoScroll = () => {
      autoScroll = setInterval(() => {
        avisContainer.scrollBy({
          left: 300, // Ajustez la valeur pour la largeur des cartes
          behavior: "smooth"
        });

        // Retour à gauche lorsque la fin est atteinte
        if (
          avisContainer.scrollLeft + avisContainer.offsetWidth >=
          avisContainer.scrollWidth
        ) {
          avisContainer.scrollTo({ left: 0, behavior: "smooth" });
        }
      }, 3000); // Changez la valeur pour la vitesse (3000 ms = 3 secondes)
    };

    // Arrêter le défilement automatique au clic sur les boutons
    prevButton.addEventListener("click", () => {
      clearInterval(autoScroll);
      avisContainer.scrollBy({ left: -300, behavior: "smooth" });
      startAutoScroll(); // Relancer le défilement automatique après l'interaction
    });

    nextButton.addEventListener("click", () => {
      clearInterval(autoScroll);
      avisContainer.scrollBy({ left: 300, behavior: "smooth" });
      startAutoScroll(); // Relancer le défilement automatique après l'interaction
    });

    // Arrêter le défilement automatique au survol, puis le redémarrer
    avisContainer.addEventListener("mouseover", () => clearInterval(autoScroll));
    avisContainer.addEventListener("mouseout", startAutoScroll);
  });
</script>





</body>
</html>
